<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Report History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }
        .container {
            max-width: 1000px;
            margin-top: 50px;
        }
        .header-section {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 15px;
        }
        .card {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.10), 0 2px 8px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }
        .table {
            margin-bottom: 0;
        }
        .table thead tr,
        .table thead th {
            background-color: #dbeafe !important;
            color: #1e3a5f !important;
        }
        .table th {
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.4rem 10px;
            border: none;
        }
        .table td {
            padding: 3px 16px;
            vertical-align: middle;
            color: #334155;
            border-bottom: 1px solid #f1f5f9;
            font-size: 15px;
            height: 20px;
            white-space: nowrap;
        }
        .table tbody tr:hover td {
            background-color: #eff6ff;
        }
        .btn-upload {
            background-color: #2563eb;
            color: white;
            border-radius: 8px;
            padding: 6px 12px;
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.2s;
            border: none;
        }
        .btn-upload:hover {
            background-color: #1d4ed8;
            color: white;
            transform: translateY(-1px);
        }
        .action-btn {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.2s;
            margin: 1px;
        }
        .btn-proceed {
            background-color: #ecfdf5;
            color: #059669;
            border: 1px solid #10b981;
        }
        .btn-proceed:hover {
            background-color: #d1fae5;
        }
        .btn-delete {
            background-color: #fef2f2;
            color: #dc2626;
            border: 1px solid #ef4444;
        }
        .btn-delete:hover {
            background-color: #fee2e2;
        }
        #uploadModal .modal-content, #deleteModal .modal-content {
            border-radius: 12px;
            border: none;
        }
        .btn-confirm-delete {
            background-color: #dc2626;
            color: white;
            border-radius: 8px;
            font-weight: 600;
        }
        .btn-confirm-delete:hover {
            background-color: #b91c1c;
            color: white;
        }
        /* Pagination Styles */
        .pagination-container { 
            padding: 15px 24px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: transparent;
            gap: 5px;
        }
        .page-info { font-size: 0.9rem; color: #3b82f6; font-weight: 600; margin: 0 10px; }
        .pagination-btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: none; 
            background: transparent; 
            color: #94a3b8; 
            cursor: pointer; 
            transition: all 0.2s;
            padding: 4px;
        }
        .pagination-btn svg { fill: currentColor; stroke: none; }
        .pagination-btn:hover:not(:disabled) { color: #3b82f6; }
        .pagination-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
<link href="/css/global-theme.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar('Files')}"></div>

    <div class="container">
        <!-- Success/Error Alerts -->
        <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${param.success}">Success message</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${param.error}">Error message</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="header-section">
            <button class="btn btn-upload" data-bs-toggle="modal" data-bs-target="#uploadModal">
                + Upload New File
            </button>
        </div>

        <div class="card">
            <div class="table-responsive">
                <table class="table">
                <thead>
                    <tr>
                        <th>File Name</th>
                        <th>File Size</th>
                        <th>Upload Date</th>
                        <th class="text-center">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="f : ${files}">
                        <td class="fw-medium py-2">
                            <span th:text="${f.fileName}"></span>
                            <span th:if="${f.filePath == null}" class="badge bg-warning text-dark ms-2" style="font-size: 0.6rem;">Old (Re-upload)</span>
                        </td>
                        <td class="text-nowrap" th:text="${#numbers.formatDecimal(f.size / 1024.0 / 1024.0, 1, 2) + ' MB'}"></td>
                        <td th:text="${#temporals.format(f.uploadDate, 'dd MMM yyyy, HH:mm')}"></td>
                        <td class="text-center">
                            <a href="#" class="action-btn btn-delete text-decoration-none" 
                               th:onclick="'confirmDelete(\'/contractor/delete-file/' + ${f.id} + '\')'">
                                Delete
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(files)}" class="no-records">
                        <td colspan="4" class="text-center py-5 text-muted">No files uploaded yet.</td>
                    </tr>
                </tbody>
            </table>
            </div>
        </div>

        <!-- Pagination Controls -->
        <div class="d-flex justify-content-center mt-3 mb-4">
            <div class="pagination-container" id="paginationControls">
            </div>
        </div>
    </div>

    <!-- Upload Modal -->
    <div class="modal fade" id="uploadModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Upload Report File</h5>
                    <button type="button" class="btn-close" data-bs-toggle="modal" data-bs-target="#uploadModal"></button>
                </div>
                <div class="modal-body">
                    <div id="fileError" class="text-danger small mb-3" style="display: none; font-weight: 500;">no file selected</div>
                    <form action="/contractor/upload" method="post" enctype="multipart/form-data">
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold">Select Excel File</label>
                            <input type="file" id="excelFile" name="file" class="form-control" accept=".xls,.xlsx" required>
                        </div>
                        <div class="d-flex justify-content-end gap-2">
                            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                            <button type="button" onclick="validateAndUpload(this.form)" class="btn btn-upload px-4">Upload Now</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content p-3">
                <div class="modal-header border-0 pb-0">
                    <h6 class="modal-title fw-bold text-danger">Confirm Delete</h6>
                    <button type="button" class="btn-close small" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body py-3">
                    <p class="mb-0 small">Are you sure you want to delete this file?</p>
                </div>
                <div class="modal-footer border-0 pt-0 d-flex justify-content-end gap-2">
                    <button type="button" class="btn btn-light btn-sm px-3" data-bs-dismiss="modal">Cancel</button>
                    <a id="confirmDeleteBtn" href="#" class="btn btn-confirm-delete btn-sm px-3">Delete</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Validation Error Modal -->
    <div class="modal fade" id="validationModal" tabindex="-1">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content p-3 text-center">
                <div class="modal-body py-3">
                    <div class="text-danger mb-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" class="bi bi-exclamation-circle" viewBox="0 0 16 16">
                            <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
                            <path d="M7.002 11a1 1 0 1 1 2 0 1 1 0 0 1-2 0zM7.1 4.995a.905.905 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 4.995z"/>
                        </svg>
                    </div>
                    <h6 class="fw-bold">Invalid File Type</h6>
                    <p class="mb-0 small text-muted">Please select only Excel files (.xls or .xlsx)</p>
                </div>
                <div class="modal-footer border-0 pt-0 d-flex justify-content-center">
                    <button type="button" class="btn btn-primary btn-sm px-5" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>


    <script>
        function validateAndUpload(form) {
            const fileInput = document.getElementById('excelFile');
            const fileError = document.getElementById('fileError');
            const file = fileInput.files[0];
            
            if (!file) {
                fileError.style.display = 'block';
                return;
            }

            if (fileError) fileError.style.display = 'none';

            const fileName = file.name;
            const extension = fileName.substring(fileName.lastIndexOf('.')).toLowerCase();

            if (extension === '.xls' || extension === '.xlsx') {
                form.submit();
            } else {
                // Show validation modal
                const validationModal = new bootstrap.Modal(document.getElementById('validationModal'));
                validationModal.show();
            }
        }

        function confirmDelete(url) {
            const deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));
            document.getElementById('confirmDeleteBtn').setAttribute('href', url);
            deleteModal.show();
        }

        // Pagination Logic
        let currentPage = 1;
        const recordsPerPage = 10;

        function renderTable() {
            const rows = Array.from(document.querySelectorAll('.table tbody tr:not(.no-records)'));
            const totalRecords = rows.length;
            const totalPages = Math.ceil(totalRecords / recordsPerPage) || 1;
            
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const start = (currentPage - 1) * recordsPerPage;
            const end = start + recordsPerPage;

            rows.forEach((row, idx) => {
                row.style.display = (idx >= start && idx < end) ? '' : 'none';
            });

            const controls = document.getElementById('paginationControls');
            controls.innerHTML = '';
            
            if (totalRecords > 0) {
                controls.innerHTML = `
                    <button class="pagination-btn" onclick="changePage(1)" ${currentPage === 1 ? 'disabled' : ''} title="First Page">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path d="M18.41 16.59L13.82 12l4.59-4.59L17 6l-6 6 6 6zM6 6h2v12H6z"/></svg>
                    </button>
                    <button class="pagination-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} title="Previous Page">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
                    </button>
                    <span class="page-info">${currentPage} / ${totalPages}</span>
                    <button class="pagination-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} title="Next Page">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                    </button>
                    <button class="pagination-btn" onclick="changePage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''} title="Last Page">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path d="M5.59 7.41L10.18 12l-4.59 4.59L7 18l6-6-6-6zM16 6h2v12h-2z"/></svg>
                    </button>
                `;
            }
        }

        function changePage(p) {
            currentPage = p;
            renderTable();
        }

        document.addEventListener('DOMContentLoaded', renderTable);
    </script>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
