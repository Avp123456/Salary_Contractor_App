<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Employees</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #f8fafc;
      font-family: 'Inter', sans-serif;
      color: #1e293b;
    }


    .page-header {
      padding: 1.6rem 0 1rem;
      text-align: left;
      margin-bottom: 1.8rem;
    }

    .page-header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #1e3a5f;
      margin-bottom: 0;
    }

    /* â”€â”€ Toolbar row â”€â”€ */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      padding-top: 40px;
    }

    .search-wrapper {
      position: relative;
      flex: 0 1 350px;
      min-width: 200px;
    }

    .search-wrapper .bi-search {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #6c757d;
      font-size: 0.9rem;
    }

    #employeeSearch {
      padding-left: 2.2rem;
      border-radius: 8px;
      border: 1px solid #ced4da;
      height: 36px;
      font-size: 0.85rem;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #employeeSearch:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
      outline: none;
    }

    /* â”€â”€ Add Employee button â”€â”€ */
    .btn-add-emp {
      background: linear-gradient(135deg, #2563eb, #1e40af);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.4rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn-add-emp:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      color: #fff;
      text-decoration: none;
    }

    /* â”€â”€ Table â”€â”€ */
    .emp-content-wrap { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

    .emp-table-wrapper {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12), 0 2px 8px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      margin-top: 20px;
      margin-bottom: 2rem;
    }

    .emp-table-wrapper .table {
      margin: 0;
       
    }

    .emp-table-wrapper thead tr,
    .emp-table-wrapper thead th {
      background-color: #dbeafe !important;
      color: #1e3a5f !important;
    }

    .emp-table-wrapper thead th {
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.4rem 10px;
      border: none;
    }

    .emp-table-wrapper tbody tr {
      cursor: default;
      border-bottom: 1px solid #f0f0f0;
      height: 35px;
    }

    .emp-table-wrapper tbody tr:hover td {
      background-color: #eff6ff !important;
      color: #1e3a5f;
    }

    .emp-table-wrapper tbody td {
      vertical-align: middle;
      padding: 1px 10px;
      height: 17px;
      font-size: 15px;
      line-height: 15px;
      color: #374151;
      border-color: #f0f0f0;
      white-space: nowrap;
    }

    .btn-action-small {
      padding: 3px 8px !important;
      font-size: 13px !important;
      line-height: 1.2;
    }

    .badge-id {
      font-weight: 600;
      font-size: 13px;
      color: #374151;
       
    }

    /* Pagination Styles */
    .pagination-container {
      padding: 15px 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: transparent;
      gap: 5px;
    }

    .page-info {
      font-size: 0.9rem;
      color: #3b82f6;
      font-weight: 600;
      margin: 0 10px;
    }

    .pagination-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.2s;
      padding: 4px;
    }

    .pagination-btn svg {
      fill: currentColor;
      stroke: none;
    }

    .pagination-btn:hover:not(:disabled) {
      color: #3b82f6;
    }

    .pagination-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
  </style>
  <link href="/css/global-theme.css" rel="stylesheet">
</head>

<body>

  <div th:replace="~{fragments/navbar :: navbar('Employees')}"></div>

  <div class="emp-content-wrap">

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrapper">
        <i class="bi bi-search"></i>
        <input type="text" id="employeeSearch" class="form-control"
          placeholder="Search by Employee ID, Name or Email..." oninput="filterAndPaginate()">
      </div>
      <a href="/contractor/add-employee" class="btn-add-emp">
        <i class="bi bi-person-plus-fill"></i> Add Employee
      </a>
    </div>

    <!-- Table -->
    <div class="emp-table-wrapper">
      <div class="table-responsive">
        <table class="table table-borderless">
          <thead>
            <tr>
              <th>Employee ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Mobile No</th>
              <th class="text-center">Actions</th>
            </tr>
          </thead>
          <tbody id="employeeTableBody">
            <tr th:each="emp : ${employees}">
              <td><span class="badge-id" th:text="${emp.empCode}"></span></td>
              <td th:text="${emp.name}"></td>
              <td th:text="${emp.email}"></td>
              <td th:text="${emp.mobileNo}"></td>
              <td class="text-center" style="width: 1%;">
                <a th:href="@{'/contractor/edit-employee/' + ${emp.employeeId}}" class="btn btn-warning btn-action-small me-1">
                  <i class="bi bi-pencil-fill"></i> Edit
                </a>
                <button class="btn btn-danger btn-action-small" th:onclick="'confirmDelete(' + ${emp.employeeId} + ')'"> 
                  <i class="bi bi-trash-fill"></i> Delete
                </button>
              </td>
            </tr>
            <tr id="noResultsRow" style="display:none;">
              <td colspan="5" class="text-center text-muted py-4">
                <i class="bi bi-search me-1"></i> No employees match your search.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Pagination -->
    <div class="d-flex justify-content-center mt-3 mb-4">
      <div id="paginationControls" class="pagination-container"></div>
    </div>

  </div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    let currentPage = 1;
    const recordsPerPage = 10;

    function confirmDelete(id) {
      Swal.fire({
        title: 'Are you sure?',
        text: "You won't be able to revert this!",
        icon: 'warning',
        width: '350px',
        padding: '1.5rem',
        showCancelButton: true,
        confirmButtonColor: '#3085d6',
        cancelButtonColor: '#d33',
        confirmButtonText: 'Yes, delete it!',
      }).then((result) => {
        if (result.isConfirmed) {
          window.location.href = '/contractor/delete-employee/' + id;
        }
      });
    }

    function filterAndPaginate() {
      const query = document.getElementById('employeeSearch').value.toLowerCase().trim();
      const rows = Array.from(document.querySelectorAll('#employeeTableBody tr:not(#noResultsRow)'));
      const noRow = document.getElementById('noResultsRow');

      const visibleRows = rows.filter(row => {
        const text = row.innerText.toLowerCase();
        return text.includes(query);
      });

      noRow.style.display = visibleRows.length === 0 ? '' : 'none';

      // Pagination logic
      const totalRecords = visibleRows.length;
      const totalPages = Math.ceil(totalRecords / recordsPerPage);

      if (currentPage > totalPages) currentPage = Math.max(1, totalPages);
      if (currentPage < 1) currentPage = 1;

      const start = (currentPage - 1) * recordsPerPage;
      const end = start + recordsPerPage;

      rows.forEach(row => row.style.display = 'none');
      visibleRows.forEach((row, idx) => {
        if (idx >= start && idx < end) row.style.display = '';
      });

      // Update Pagination UI
      updatePaginationUI(totalRecords, totalPages);
    }

    function updatePaginationUI(total, totalPages) {
      const controls = document.getElementById('paginationControls');
      controls.innerHTML = '';

      if (total === 0) return;

      controls.innerHTML = `
        <button class="pagination-btn" onclick="changePage(1)" ${currentPage === 1 ? 'disabled' : ''} title="First Page">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path d="M18.41 16.59L13.82 12l4.59-4.59L17 6l-6 6 6 6zM6 6h2v12H6z"/></svg>
        </button>
        <button class="pagination-btn" onclick="changePage(currentPage - 1)" ${currentPage === 1 ? 'disabled' : ''} title="Previous Page">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
        </button>
        <span class="page-info">${currentPage} / ${totalPages}</span>
        <button class="pagination-btn" onclick="changePage(currentPage + 1)" ${currentPage === totalPages ? 'disabled' : ''} title="Next Page">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
        </button>
        <button class="pagination-btn" onclick="changePage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''} title="Last Page">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path d="M5.59 7.41L10.18 12l-4.59 4.59L7 18l6-6-6-6zM16 6h2v12h-2z"/></svg>
        </button>
    `;
    }

    function changePage(p) {
      currentPage = p;
      filterAndPaginate();
    }

    // Initial call
    document.addEventListener('DOMContentLoaded', filterAndPaginate);

  </script>
  <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
