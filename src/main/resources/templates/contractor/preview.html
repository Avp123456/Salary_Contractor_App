<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Preview Data</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .container { max-width: 1200px; margin-top: 20px; }
        .header-section { margin-bottom: 30px; }
        .card { border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.10), 0 2px 8px rgba(0, 0, 0, 0.06); background: white; overflow: hidden; }
        .table { width: auto; min-width: 100%; white-space: nowrap; margin-bottom: 0; }
        .table th, .table td { white-space: nowrap; }
        .table thead tr, .table thead th { background-color: #dbeafe !important; color: #1e3a5f !important; }
        .table th { font-weight: 600; text-transform: uppercase; font-size: 13px; letter-spacing: 0.05em; padding: 0.4rem 10px; border: none; }
        .table tbody tr { height: 35px; }
        .table td { padding: 1px 10px; font-size: 15px; height: 17px; line-height: 15px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
        .table tbody tr:hover td { background-color: #eff6ff !important; color: #1e3a5f; }
        .btn-save { background-color: #059669; color: white; font-weight: 600; padding: 6px 16px; border-radius: 6px; font-size: 0.85rem; transition: all 0.2s; border: none; }
        .btn-save:hover { background-color: #047857; color: white; transform: translateY(-1px); }
        .badge-count { background-color: #dcfce7; color: #166534; padding: 4px 12px; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
        .table th { cursor: pointer; user-select: none; position: relative; }
        .table th:hover { background-color: #e2e8f0; }
        .sort-icon { display: inline-block; margin-left: 6px; font-size: 0.85rem; font-weight: bold; color: #0f172a; }
        .sort-icon-default { display: inline-block; margin-left: 6px; color: #cbd5e1; font-size: 0.85rem; font-weight: normal; letter-spacing: -2px; }
        /* Pagination Styles */
        .pagination-container { 
            padding: 15px 24px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: transparent;
            gap: 5px;
        }
        .page-info { font-size: 0.9rem; color: #3b82f6; font-weight: 600; margin: 0 10px; }
        .pagination-btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: none; 
            background: transparent; 
            color: #94a3b8; 
            cursor: pointer; 
            transition: all 0.2s;
            padding: 4px;
        }
        .pagination-btn svg { fill: currentColor; stroke: none; }
        .pagination-btn:hover:not(:disabled) { color: #3b82f6; }
        .pagination-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar('Files')}"></div>

    <div class="container">
        <div style="padding-top: -62px; padding-bottom: 10px;">
            <button class="btn btn-light" style="font-size: 0.85rem;" onclick="history.back()">&larr; Back</button>
        </div>

        <div class="header-section d-flex align-items-center justify-content-between" style="margin-bottom: 20px;">
            <h2 class="fw-bold mb-0 text-start" style="color: #1e293b; letter-spacing: -0.025em; ">Preview Processed Data</h2>
            
            <div class="d-flex align-items-center gap-3">
                <div style="width: 250px;">
                    <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="Search data...">
                </div>
                <form action="/contractor/save-data" method="post" class="mb-0">
                    <button type="submit" class="btn btn-save">Confirm & Save</button>
                </form>
            </div>
        </div>

        <div class="mb-3 d-flex align-items-center justify-content-between">
            <span class="badge-count" th:text="${data.size() + ' Rows Detected'}"></span>
        </div>

        <div class="card">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th style="width: 80px;">Sr No. <span class="sort-icon-default">&#8593;&#8595;</span></th>
                            <th th:each="col : ${columns}">
                                <span th:text="${col.columnName}"></span><span class="sort-icon-default">&#8593;&#8595;</span>
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="row, stat : ${data}">
                            <td class="text-muted small" th:text="${stat.count}"></td>
                            <td th:each="cell, cellStat : ${row}">
                                <span th:with="col=${columns[cellStat.index]}">
                                    <span th:text="${(cell == null || cell.trim().isEmpty()) ? (col.dataType != null && 'NUMBER'.equalsIgnoreCase(col.dataType) ? '0' : '-') : cell}"></span>
                                </span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(data)}" class="no-data-row">
                            <td th:colspan="${#lists.size(columns) + 1}" class="text-center py-5 text-muted">No data found after applying filters.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="d-flex justify-content-center mt-3 mb-4">
            <div class="pagination-container" id="pagination-container" style="display: none !important;">
                <button class="pagination-btn" id="btn-first">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path d="M18.41 16.59L13.82 12l4.59-4.59L17 6l-6 6 6 6zM6 6h2v12H6z"/></svg>
                </button>
                <button class="pagination-btn" id="btn-prev">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
                </button>
                <span class="page-info" id="pagination-info">1 / 1</span>
                <button class="pagination-btn" id="btn-next">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                </button>
                <button class="pagination-btn" id="btn-last">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path d="M5.59 7.41L10.18 12l-4.59 4.59L7 18l6-6-6-6zM16 6h2v12h-2z"/></svg>
                </button>
            </div>
        </div>

    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('searchInput');
            const table = document.querySelector('.table');
            const tbody = table.querySelector('tbody');
            const rows = Array.from(tbody.querySelectorAll('tr:not(.no-data-row)'));
            
            // Pagination settings
            const rowsPerPage = 15;
            let currentPage = 1;
            const paginationContainer = document.getElementById('pagination-container');
            const paginationInfo = document.getElementById('pagination-info');
            const btnFirst = document.getElementById('btn-first');
            const btnPrev = document.getElementById('btn-prev');
            const btnNext = document.getElementById('btn-next');
            const btnLast = document.getElementById('btn-last');

            function renderTable() {
                const term = searchInput.value.toLowerCase();
                const filteredRows = rows.filter(row => row.textContent.toLowerCase().includes(term));
                
                const totalPages = Math.ceil(filteredRows.length / rowsPerPage);
                if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;
                if (currentPage < 1) currentPage = 1;

                rows.forEach(row => row.style.display = 'none'); // Hide all

                const startIdx = (currentPage - 1) * rowsPerPage;
                const endIdx = startIdx + rowsPerPage;

                let visibleCount = 0;
                filteredRows.forEach((row, idx) => {
                    if (idx >= startIdx && idx < endIdx) {
                        row.style.display = '';
                    }
                    visibleCount++;
                });

                // Update pagination UI
                if (filteredRows.length > rowsPerPage) {
                    paginationContainer.style.setProperty('display', 'flex', 'important');
                    paginationInfo.textContent = `${currentPage} / ${totalPages}`;
                    btnFirst.disabled = currentPage === 1;
                    btnPrev.disabled = currentPage === 1;
                    btnNext.disabled = currentPage === totalPages;
                    btnLast.disabled = currentPage === totalPages;
                } else {
                    paginationContainer.style.setProperty('display', 'none', 'important');
                }

                // Empty state
                let noDataRow = tbody.querySelector('.no-data-row');
                if (visibleCount === 0 && rows.length > 0) {
                    if (!noDataRow) {
                        noDataRow = document.createElement('tr');
                        noDataRow.className = 'no-data-row';
                        noDataRow.innerHTML = `<td colspan="${table.querySelectorAll('th').length}" class="text-center py-5 text-muted">No matching data found.</td>`;
                        tbody.appendChild(noDataRow);
                    }
                    noDataRow.style.display = '';
                } else if (noDataRow) {
                    noDataRow.style.display = 'none';
                }
            }

            btnFirst.addEventListener('click', () => { if (currentPage > 1) { currentPage = 1; renderTable(); } });
            btnPrev.addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderTable(); } });
            btnNext.addEventListener('click', () => { 
                const term = searchInput.value.toLowerCase();
                const filteredRows = rows.filter(row => row.textContent.toLowerCase().includes(term));
                if (currentPage < Math.ceil(filteredRows.length / rowsPerPage)) { currentPage++; renderTable(); } 
            });
            btnLast.addEventListener('click', () => { 
                const term = searchInput.value.toLowerCase();
                const filteredRows = rows.filter(row => row.textContent.toLowerCase().includes(term));
                const totalPages = Math.ceil(filteredRows.length / rowsPerPage);
                if (currentPage < totalPages) { currentPage = totalPages; renderTable(); } 
            });

            searchInput.addEventListener('input', () => {
                currentPage = 1;
                renderTable();
            });

            // Sorting functionality
            const headers = table.querySelectorAll('th');
            let currentSortCol = -1;
            let currentSortAsc = true;

            headers.forEach((header, index) => {
                header.addEventListener('click', () => {
                    if (currentSortCol === index) {
                        currentSortAsc = !currentSortAsc;
                    } else {
                        currentSortCol = index;
                        currentSortAsc = true;
                    }

                    // Update icons
                    headers.forEach(h => {
                        const icon = h.querySelector('.sort-icon');
                        if(icon) icon.remove();
                        const def = h.querySelector('.sort-icon-default');
                        if(def) def.style.display = 'inline-block';
                    });
                    
                    const def = header.querySelector('.sort-icon-default');
                    if(def) def.style.display = 'none';

                    const icon = document.createElement('span');
                    icon.className = 'sort-icon';
                    icon.innerHTML = currentSortAsc ? '&#8593;' : '&#8595;';
                    header.appendChild(icon);

                    // Sort rows
                    const sortedRows = rows.sort((a, b) => {
                        let aVal = a.cells[index].textContent.trim();
                        let bVal = b.cells[index].textContent.trim();
                        
                        if(aVal === '-') aVal = '';
                        if(bVal === '-') bVal = '';

                        const aNum = parseFloat(aVal.replace(/,/g, ''));
                        const bNum = parseFloat(bVal.replace(/,/g, ''));
                        
                        if (!isNaN(aNum) && !isNaN(bNum) && aVal !== '' && bVal !== '') {
                            return currentSortAsc ? aNum - bNum : bNum - aNum;
                        }
                        
                        return currentSortAsc ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
                    });

                    sortedRows.forEach(row => tbody.appendChild(row));
                    currentPage = 1;
                    renderTable();
                });
            });
            
            // Initial render
            renderTable();
        });
    </script>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
