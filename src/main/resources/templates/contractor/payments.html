<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <title>Payments Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .container { max-width: 96%; margin-top: 50px; padding: 0 15px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); background: white; padding: 15px; margin-bottom: 20px; overflow-x: auto; }
        .table thead { background-color: #f1f5f9; }
        .table th { font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; color: #64748b; padding: 16px; border-bottom: 1px solid #e2e8f0; }
        .table td { padding: 12px 16px; font-size: 0.875rem; border-bottom: 1px solid #f1f5f9; }
        .badge-pending { background-color: #fef3c7; color: #92400e; font-weight: 600; font-size: 0.75rem; padding: 4px 8px; border-radius: 6px; }
        .btn-pay { background-color: #10b981; color: white; font-weight: 600; padding: 6px 12px; border-radius: 8px; border: none; font-size: 0.8rem; }
        .btn-view { background-color: #f1f5f9; color: #475569; font-weight: 600; padding: 6px 12px; border-radius: 8px; border: none; font-size: 0.8rem; margin-right: 5px; }
        .btn-view:hover { background-color: #e2e8f0; }
        
        /* Modal Styling */
        .modal-content { border-radius: 16px; border: none; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        .modal-header { border-bottom: 1px solid #f1f5f9; padding: 20px 24px; }
        .modal-title { font-weight: 700; color: #1e293b; }
        .modal-body { padding: 24px; }
        .modal-footer { border-top: 1px solid #f1f5f9; padding: 16px 24px; }
        
        .salary-field { margin-bottom: 15px; }
        .salary-field label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #64748b; margin-bottom: 5px; }
        .salary-field input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #e2e8f0; background-color: #f8fafc; font-size: 0.9rem; transition: all 0.2s; }
        .salary-field input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12); background-color: white; }
        .salary-field input[readonly] { background-color: #f1f5f9; cursor: not-allowed; border-color: #f1f5f9; }
        
        .btn-edit-top { color: #2563eb; font-weight: 600; font-size: 0.85rem; border: none; background: none; padding: 0; cursor: pointer; }
        .btn-edit-top:hover { text-decoration: underline; }
        .btn-ok { background-color: #2563eb; color: white; font-weight: 600; padding: 8px 24px; border-radius: 8px; border: none; display: none; }
        .swal2-compact .swal2-icon { margin: -5px auto 2px; transform: scale(0.45); transform-origin: center top; }
        .swal2-compact .swal2-title { font-size: 0.92rem; padding: 0; margin: 0; }
        .swal2-compact .swal2-html-container { font-size: 0.76rem; margin: 3px 0 0; }
        
        /* Sorting Icons */
        .table th { cursor: pointer; user-select: none; transition: background-color 0.2s; }
        .table th:hover { background-color: #e2e8f0; }
        .sort-icon { margin-left: 5px; color: #cbd5e1; font-weight: normal; }
        .sort-asc .sort-icon-up, .sort-desc .sort-icon-down { color: #3b82f6; font-weight: bold; }
        
        /* Filter Styles */
        .filter-row { background-color: #eff6ff; }
        .filter-row th { padding: 8px 16px; border-bottom: 1px solid #dbeafe; cursor: default !important; }
        .filter-row th:hover { background-color: #eff6ff !important; }
        
        .search-wrapper { position: relative; display: flex; align-items: center; }
        .column-filter { 
            width: 100%; 
            padding: 6px 30px 6px 10px; 
            border-radius: 6px; 
            border: 1px solid #d1d5db; 
            font-size: 0.75rem; 
            font-weight: 400;
            background-color: white;
            color: #1e293b;
        }
        .column-filter:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        
        /* Pagination Styles */
        .pagination-container { 
            padding: 15px 24px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: transparent;
            gap: 5px;
        }
        .page-info { font-size: 0.9rem; color: #3b82f6; font-weight: 600; margin: 0 10px; }
        .pagination-btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: none; 
            background: transparent; 
            color: #94a3b8; 
            cursor: pointer; 
            transition: all 0.2s;
            padding: 4px;
        }
        .pagination-btn svg { fill: currentColor; stroke: none; }
        .pagination-btn:hover:not(:disabled) { color: #3b82f6; }
        .pagination-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .status-dropdown {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            text-align: center;
            text-align-last: center;
        }
        
        .custom-dropdown-item {
            transition: all 0.2s ease;
        }
        .custom-dropdown-item:hover {
            background-color: #f1f5f9 !important;
            color: #0f172a !important;
            transform: translateX(2px);
        }
        .dropdown-toggle::after {
            display: none;
        }
    </style>
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar('Payments')}"></div>

    <div class="container">
        <div class="card">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th style="width: 80px;" onclick="sortTable(0)" class="sortable">
                                SR NO. <span class="sort-icon"><span class="sort-icon-up">↑</span><span class="sort-icon-down">↓</span></span>
                            </th>
                            <th style="width: 20%;" onclick="sortTable(1)" class="sortable">
                                Employee ID <span class="sort-icon"><span class="sort-icon-up">↑</span><span class="sort-icon-down">↓</span></span>
                            </th>
                            <th style="width: 30%;" onclick="sortTable(2)" class="sortable">
                                Employee Name <span class="sort-icon"><span class="sort-icon-up">↑</span><span class="sort-icon-down">↓</span></span>
                            </th>
                            <th style="width: 20%;" onclick="sortTable(3)" class="sortable">
                                Amount <span class="sort-icon"><span class="sort-icon-up">↑</span><span class="sort-icon-down">↓</span></span>
                            </th>
                            <th class="text-center" style="width: 240px;">Action</th>
                        </tr>
                        <tr class="filter-row">
                            <th></th>
                            <th>
                                <div class="search-wrapper">
                                    <input type="text" class="column-filter" placeholder="Search..." onkeyup="filterTable()">
                                </div>
                            </th>
                            <th>
                                <div class="search-wrapper">
                                    <input type="text" class="column-filter" placeholder="Search..." onkeyup="filterTable()">
                                </div>
                            </th>
                            <th>
                                <div class="search-wrapper">
                                    <input type="text" class="column-filter" placeholder="Search..." onkeyup="filterTable()">
                                </div>
                            </th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr th:each="p, stat : ${payments}" th:id="'row-' + ${p.id}">
                            <td th:text="${stat.count}"></td>
                            <td th:text="${p.empCode}"></td>
                            <td>
                                <span th:text="${p.name}"></span>
                                <span th:if="${p.registered == false}" class="badge bg-warning text-dark ms-1" style="font-size: 0.65rem;">Not Registered</span>
                            </td>
                            <td class="fw-bold amount-cell" th:text="'₹' + ${#numbers.formatDecimal(p.amount, 1, 'COMMA', 2, 'POINT')}"></td>
                            <td class="text-center text-nowrap">
                                <div class="d-flex justify-content-center align-items-center gap-2">
                                    <button class="btn btn-view btn-sm px-3 m-0" style="font-size: 13px;" th:onclick="'openSalaryModal(' + ${p.id} + ')'">View Structure</button>
                                    
                                    <button class="btn btn-primary btn-sm px-3 m-0" 
                                            style="background-color: #0f172a; border: none; font-size: 13px;"
                                            th:data-id="${p.id}"
                                            th:onclick="'window.open(\'/contractor/payslip/' + ${p.id} + '\', \'_blank\')'"
                                            th:disabled="${p.registered == false}">View Slip</button>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${payments == null || payments.empty}" id="noDataRow" class="no-data-row">
                            <td colspan="5" class="text-center py-5 text-muted">
                                No Matching Records Found
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination Controls -->
            <div class="pagination-container" id="paginationControls" th:if="${payments != null && !payments.empty}">
                <button class="pagination-btn" onclick="goToPage(1)" id="firstPageBtn" title="First Page">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path d="M18.41 16.59L13.82 12l4.59-4.59L17 6l-6 6 6 6zM6 6h2v12H6z"/></svg>
                </button>
                <button class="pagination-btn" onclick="prevPage()" id="prevBtn" title="Previous Page">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
                </button>
                <span class="page-info" id="pageDisplay">1 / 1</span>
                <button class="pagination-btn" onclick="nextPage()" id="nextBtn" title="Next Page">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                </button>
                <button class="pagination-btn" onclick="goToLastPage()" id="lastPageBtn" title="Last Page">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path d="M5.59 7.41L10.18 12l-4.59 4.59L7 18l6-6-6-6zM16 6h2v12h-2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Salary Structure Modal -->
    <div class="modal fade" id="salaryModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header d-flex justify-content-between align-items-center">
                    <h5 class="modal-title">Salary Structure</h5>
                    <button type="button" id="editToggleBtn" class="btn-edit-top" onclick="toggleEdit()">Edit</button>
                </div>
                <div class="modal-body">
                    <div id="salaryFieldsContainer" class="row">
                        <!-- Fields will be loaded here via JS -->
                        <div class="text-center py-4">Loading structure...</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Close</button>
                    <button type="button" id="saveBtn" class="btn-ok" onclick="saveSalaryChanges()">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        let allData = [];
        let filteredData = [];
        let currentPage = 1;
        const pageSize = 10;
        let currentSort = { col: -1, asc: true };

        let currentDataId = null;
        let isEditMode = false;
        let modalInstance = null;
        
        document.addEventListener('DOMContentLoaded', function() {
            const tableRows = document.querySelectorAll('tbody#tableBody > tr:not(.no-data-row)');
            if (tableRows.length > 0) {
                tableRows.forEach(tr => {
                    const rowData = {
                        element: tr,
                        cells: Array.from(tr.cells).map(td => td.innerText.trim())
                    };
                    allData.push(rowData);
                });
                filteredData = [...allData];
                renderTable();
            }
        });

        function filterTable() {
            const filters = Array.from(document.querySelectorAll('.column-filter')).map(i => i.value.toLowerCase());
            
            filteredData = allData.filter(row => {
                // filters correspond to col indexes 1, 2, 3
                return filters.every((filter, index) => {
                    if (!filter) return true;
                    const cellVal = row.cells[index + 1].toLowerCase();
                    return cellVal.includes(filter);
                });
            });

            currentPage = 1;
            renderTable();
        }

        function sortTable(colIndex) {
            const headers = document.querySelectorAll('th.sortable');
            
            if (currentSort.col === colIndex) {
                currentSort.asc = !currentSort.asc;
            } else {
                currentSort.col = colIndex;
                currentSort.asc = true;
            }

            headers.forEach((h, idx) => {
                h.classList.remove('sort-asc', 'sort-desc');
            });
            
            const targetHeader = headers[colIndex];
            if (targetHeader) {
                targetHeader.classList.add(currentSort.asc ? 'sort-asc' : 'sort-desc');
            }

            filteredData.sort((a, b) => {
                let valA = a.cells[colIndex];
                let valB = b.cells[colIndex];

                const numA = parseFloat(valA.replace(/[^0-9.-]+/g, ''));
                const numB = parseFloat(valB.replace(/[^0-9.-]+/g, ''));
                
                if (!isNaN(numA) && !isNaN(numB)) {
                    return currentSort.asc ? numA - numB : numB - numA;
                }

                return currentSort.asc 
                    ? valA.localeCompare(valB) 
                    : valB.localeCompare(valA);
            });

            renderTable();
        }

        function renderTable() {
            const tableBody = document.getElementById('tableBody');
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const pageData = filteredData.slice(startIndex, endIndex);

            allData.forEach(row => row.element.style.display = 'none');

            pageData.forEach(row => {
                row.element.style.display = '';
                tableBody.appendChild(row.element); 
            });

            const totalPages = Math.ceil(filteredData.length / pageSize) || 1;
            const pageDisplay = document.getElementById('pageDisplay');
            if (pageDisplay) {
                pageDisplay.innerText = `${currentPage} / ${totalPages}`;
                
                document.getElementById('prevBtn').disabled = currentPage === 1;
                document.getElementById('firstPageBtn').disabled = currentPage === 1;
                document.getElementById('nextBtn').disabled = currentPage === totalPages;
                document.getElementById('lastPageBtn').disabled = currentPage === totalPages;
            }

            let noDataRow = document.getElementById('noDataRow');
            if (!noDataRow && filteredData.length === 0) {
                noDataRow = document.createElement('tr');
                noDataRow.id = 'noDataRow';
                noDataRow.className = 'no-data-row';
                noDataRow.innerHTML = '<td colspan="5" class="text-center py-5 text-muted">No Matching Records Found</td>';
                tableBody.appendChild(noDataRow);
            }
            if (noDataRow) {
                noDataRow.style.display = filteredData.length === 0 ? '' : 'none';
            }
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                renderTable();
            }
        }

        function nextPage() {
            const totalPages = Math.ceil(filteredData.length / pageSize);
            if (currentPage < totalPages) {
                currentPage++;
                renderTable();
            }
        }

        function goToPage(page) {
            currentPage = page;
            renderTable();
        }

        function goToLastPage() {
            currentPage = Math.ceil(filteredData.length / pageSize) || 1;
            renderTable();
        }

        function getModal() {
            if (!modalInstance) {
                modalInstance = new bootstrap.Modal(document.getElementById('salaryModal'));
            }
            return modalInstance;
        }

        async function openSalaryModal(id) {
            currentDataId = id;
            isEditMode = false;
            document.getElementById('editToggleBtn').innerText = 'Edit';
            document.getElementById('saveBtn').style.display = 'none';
            
            const container = document.getElementById('salaryFieldsContainer');
            container.innerHTML = '<div class="text-center py-4">Loading structure...</div>';
            
            getModal().show();
            
            try {
                const response = await fetch(`/contractor/get-payment-details?id=${id}`);
                const data = await response.json();
                
                // Update viewed status dynamically
                const btn = document.getElementById(`btn-payslip-${id}`);
                if (btn) btn.setAttribute('data-viewed', 'true');
                
                container.innerHTML = '';
                let firstStrField = true;
                data.fields.forEach(field => {
                    const isIdField = firstStrField && field.actual.startsWith('str');
                    if (isIdField) firstStrField = false;

                    const col = document.createElement('div');
                    col.className = 'col-md-6 salary-field';
                    col.innerHTML = `
                        <label>${field.name}</label>
                        <input type="text" 
                               value="${field.value}" 
                               data-actual="${field.actual}" 
                               data-type="${field.type}"
                               ${isIdField ? 'data-locked="true"' : ''}
                               ${field.isTotal ? 'data-total="true" style="border: 1.5px solid #2563eb;"' : ''}
                               readonly>
                    `;
                    container.appendChild(col);
                });
            } catch (err) {
                container.innerHTML = '<div class="text-center py-4 text-danger">Error loading data.</div>';
            }
        }

        function toggleEdit() {
            isEditMode = !isEditMode;
            const fields = document.querySelectorAll('.salary-field');
            const editBtn = document.getElementById('editToggleBtn');
            const saveBtn = document.getElementById('saveBtn');
            
            if (isEditMode) {
                fields.forEach(field => {
                    const input = field.querySelector('input');
                    // Never allow editing locked (ID) fields
                    if (!input.hasAttribute('data-locked')) {
                        input.removeAttribute('readonly');
                    }
                });
                editBtn.innerText = 'Cancel';
                saveBtn.style.display = 'block';
            } else {
                // Reset all non-locked fields back to readonly
                fields.forEach(field => {
                    const input = field.querySelector('input');
                    if (!input.hasAttribute('data-locked')) {
                        input.setAttribute('readonly', true);
                    }
                });
                editBtn.innerText = 'Edit';
                saveBtn.style.display = 'none';
            }
        }

        async function saveSalaryChanges() {
            const inputs = document.querySelectorAll('#salaryFieldsContainer input');
            const updates = {};
            
            inputs.forEach(input => {
                const col = input.getAttribute('data-actual');
                const val = input.value;
                updates[col] = val;
            });

            try {
                const response = await fetch('/contractor/update-payment-data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: currentDataId,
                        updates: updates
                    })
                });

                if (await response.text() === 'OK') {
                    const totalInput = document.querySelector('#salaryFieldsContainer input[data-total="true"]');
                    const lastInput = inputs[inputs.length - 1];
                    const targetInput = totalInput || lastInput;

                    const newTotal = parseFloat(targetInput.value.replace(/,/g, '')) || 0;

                    const row = document.getElementById(`row-${currentDataId}`);
                    if (row) {
                        const amountCell = row.querySelector('.amount-cell');
                        amountCell.innerText = '₹' + newTotal.toLocaleString('en-IN', { minimumFractionDigits: 2 });
                    }

                    getModal().hide();

                    Swal.fire({
                        title: 'Updated!',
                        text: 'Salary structure saved.',
                        icon: 'success',
                        width: 250,
                        padding: '16px',
                        customClass: { popup: 'swal2-compact' },
                        confirmButtonColor: '#2563eb',
                        timer: 2000,
                        showConfirmButton: false
                    });
                }

            } catch (err) {
                Swal.fire({
                    title: 'Error',
                    text: 'Failed to save changes.',
                    icon: 'error',
                    width: 250,
                    padding: '16px',
                    customClass: { popup: 'swal2-compact' },
                    confirmButtonColor: '#2563eb'
                });
            }
        }

    </script>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
